[project]
name = "{{cookiecutter.repo_name}}"
version = "0.0.1"
description = "{{cookiecutter.description}}"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = "{{cookiecutter.python_version}}.*"
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
lightning = ">=2.2.0"
hydra-core = ">=1.3.2"
wandb = ">=0.16.0"
numpy = ">=1.24.0"
omegaconf = ">=2.3.0"
pydantic = ">=2.0.0"
loguru = ">=0.7.0"

[feature.dev.dependencies]
pytest = ">=8.0.0"
pytest-cov = ">=4.1.0"
ruff = ">=0.2.2"
mypy = ">=1.8.0"
pre-commit = ">=3.5.0"
ipykernel = "*"
mkdocs-material = ">=9.5.0"
mkdocstrings = ">=0.24.0"
nbqa = ">=1.7.1"
nbstripout = ">=0.7.1"

[feature.cuda.system-requirements]
cuda = "12"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
cuda = { features = ["cuda", "dev"], solve-group = "default" }

[tasks]
train = "python src/{{cookiecutter.repo_name}}/train.py"
test = "pytest tests/"
lint = "ruff check ."
format = "ruff format ."
build-docs = "mkdocs build --strict"
serve-docs = "mkdocs serve"
