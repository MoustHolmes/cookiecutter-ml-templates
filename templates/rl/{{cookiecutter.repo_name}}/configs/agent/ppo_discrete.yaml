_target_: {{cookiecutter.repo_name}}.ppo_module.PPOModule

# PPOAgentDiscrete — obs_dim / n_actions injected by env config
agent:
  _target_: {{cookiecutter.repo_name}}.models.ppo_agent.PPOAgentDiscrete
  obs_dim: ???
  n_actions: ???
  hidden_dim: 64

# Rollout collection
num_steps: 128          # steps per env per PPO update
num_envs: 4             # must match RolloutDataModule.num_envs

# PPO hyperparameters
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4      # batch_size = num_steps * num_envs = 512; mb = 128
update_epochs: 4
clip_coef: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
norm_adv: true
clip_vloss: true
target_kl: null

# LR annealing
anneal_lr: true
total_timesteps: 500000

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 2.5e-4
  eps: 1.0e-5
