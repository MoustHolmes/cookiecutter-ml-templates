model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: null
  filename: "epoch_{epoch:03d}"
  monitor: null           # RL has no standard val metric; save every N epochs via trainer
  save_top_k: -1          # -1 = save all checkpoints
  save_last: true
  verbose: false

episode_logger:
  _target_: {{cookiecutter.repo_name}}.callbacks.episode_logger.EpisodeLoggerCallback
  eval_episodes: 5        # greedy rollouts run at on_train_epoch_end
  log_every_n_epochs: 10  # how often to run eval rollouts

video_logger:
  _target_: {{cookiecutter.repo_name}}.callbacks.video_logger.VideoLoggerCallback
  log_every_n_epochs: 50  # render and upload one episode to WandB every N epochs
  fps: 30
  max_episode_steps: 500
