# @package _global_

# RLDataModule wrapping LunarLanderContinuous-v2
# obs_dim=8, action_dim=2 (main engine + lateral engines ∈ [-1, 1])
# Requires: pip install gymnasium[box2d]
env:
  _target_: {{cookiecutter.repo_name}}.data.env_datamodule.RLDataModule
  env_id: "LunarLanderContinuous-v3"
  buffer_size: 300000
  batch_size: 256
  num_workers: 0
  seed: 42
  normalize_obs: true
  reward_scale: 1.0
  num_batches_per_epoch: 10

# LunarLanderContinuous action space: [-1, 1] → action_scale=1.0, action_bias=0.0
agent:
  actor:
    obs_dim: 8
    action_dim: 2
    action_scale: 1.0
    action_bias: 0.0
  critic:
    obs_dim: 8
    action_dim: 2
  # target_entropy auto-computed by SACModule as -action_dim when null
