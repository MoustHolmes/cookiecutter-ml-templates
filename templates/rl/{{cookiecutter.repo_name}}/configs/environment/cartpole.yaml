# @package _global_

# RolloutDataModule wrapping CartPole-v1 — for PPO / RPO
# CartPole-v1: obs_dim=4 (pos, vel, angle, ang_vel), n_actions=2 (left/right)
env:
  _target_: {{cookiecutter.repo_name}}.data.rollout_datamodule.RolloutDataModule
  env_id: "CartPole-v1"
  num_envs: 4
  seed: 42

# Inject environment dimensions into agent sub-configs
agent:
  agent:
    obs_dim: 4
    n_actions: 2
  num_envs: 4             # must match env.num_envs
