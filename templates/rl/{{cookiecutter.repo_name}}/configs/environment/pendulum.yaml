# @package _global_

# RLDataModule wrapping Pendulum-v1
# Pendulum-v1: obs_dim=3 (cos θ, sin θ, θ̇), action_dim=1 (torque ∈ [-2, 2])
env:
  _target_: {{cookiecutter.repo_name}}.data.env_datamodule.RLDataModule
  env_id: "Pendulum-v1"
  buffer_size: 100000
  batch_size: 256
  num_workers: 0
  seed: 42
  normalize_obs: true
  reward_scale: 1.0
  num_batches_per_epoch: 10

# Inject environment dimensions into agent sub-configs
# Pendulum action space: [-2, 2] → action_scale=2.0, action_bias=0.0
agent:
  actor:
    obs_dim: 3
    action_dim: 1
  critic:
    obs_dim: 3
    action_dim: 1
  action_scale: 2.0
  action_bias: 0.0
