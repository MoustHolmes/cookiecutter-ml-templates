# @package _global_
# Override env + agent dims for LunarLanderContinuous-v2.
# Requires: pip install gymnasium[box2d]

defaults:
  - override /environment: lunar_lander

task_name: lunar_lander_sac

trainer:
  max_epochs: 1000

agent:
  learning_starts: 5000
  gradient_steps: 2       # more updates per step for harder env
