[workspace]
name = "{{cookiecutter.repo_name}}"
version = "0.0.1"
description = "{{cookiecutter.description}}"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = "{{cookiecutter.python_version}}.*"
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
lightning = ">=2.0.0"
hydra-core = ">=1.3.0"
wandb = ">=0.15.0"
numpy = ">=1.24.0"
omegaconf = ">=2.3.0"

[pypi-dependencies]
{{cookiecutter.repo_name}} = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=7.4.0"
pytest-cov = ">=4.1.0"
ruff = ">=0.1.0"
mypy = ">=1.5.0"
pre-commit = ">=3.4.0"
ipykernel = "*"
mkdocs-material = ">=9.4.0"
mkdocstrings = ">=0.24.0"

[feature.cuda.system-requirements]
cuda = "12"

[environments]
default = { features = ["dev"], solve-group = "default" }
cuda = { features = ["cuda", "dev"], solve-group = "default" }

[tasks]
train = "python src/{{cookiecutter.repo_name}}/train.py"
test = "pytest tests/"
lint = "ruff check ."
format = "ruff format ."
preprocess = "python src/{{cookiecutter.repo_name}}/data/make_dataset.py"
build-docs = "mkdocs build --strict"
serve-docs = "mkdocs serve"
